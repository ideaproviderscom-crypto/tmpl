<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テンプレ帳</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; padding-bottom: 80px; }

/* ロック画面 */
#lockScreen {
  position: fixed; inset: 0; background: #1a1a2e;
  display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
}
#lockScreen h2 { color: white; font-size: 1.1rem; margin-bottom: 24px; }
#lockInput { width: 200px; padding: 14px; text-align: center; font-size: 1.5rem; border: none; border-radius: 12px; letter-spacing: 0.2em; margin-bottom: 14px; }
#lockBtn { width: 200px; padding: 13px; background: #6366f1; color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; }
#lockError { color: #f87171; font-size: 0.85rem; margin-top: 10px; min-height: 20px; }

/* ヘッダー */
header { background: #1a1a2e; color: white; padding: 16px 20px 12px; position: sticky; top: 0; z-index: 100; }
header h1 { font-size: 1.1rem; font-weight: 600; margin-bottom: 10px; }
#searchInput { width: 100%; padding: 9px 14px; border: none; border-radius: 10px; font-size: 16px; background: #3a3a4e; color: white; }
#searchInput::placeholder { color: #8e8e9a; }
#searchInput:focus { outline: none; background: #4a4a5e; }

/* タブ */
.tabs { display: flex; gap: 6px; padding: 10px 16px; overflow-x: auto; background: white; border-bottom: 1px solid #e5e7eb; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { flex-shrink: 0; padding: 6px 14px; border: none; border-radius: 20px; font-size: 13px; cursor: pointer; background: #e5e7eb; color: #555; font-weight: 500; }
.tab.active { background: #1a1a2e; color: white; }
.tab-add { flex-shrink: 0; padding: 6px 12px; border: 1.5px dashed #bbb; border-radius: 20px; font-size: 13px; cursor: pointer; background: transparent; color: #888; }
.tab-wrap { display: flex; align-items: center; gap: 6px; }

.count { padding: 8px 16px; font-size: 12px; color: #999; }
#list { padding: 8px 16px 24px; }

/* カード */
.card { background: white; border-radius: 12px; margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.09); overflow: hidden; }
.card-header { padding: 13px 16px; cursor: pointer; display: flex; align-items: center; gap: 10px; user-select: none; }
.badge { font-size: 10px; padding: 3px 8px; border-radius: 10px; flex-shrink: 0; font-weight: 600; }
.badge-商品説明 { background: #dbeafe; color: #1d4ed8; }
.badge-購入者返信 { background: #dcfce7; color: #15803d; }
.badge-テクサポ { background: #ffedd5; color: #c2410c; }
.badge-メーカー { background: #f3e8ff; color: #7e22ce; }
.badge-カスタム { background: #fef3c7; color: #92400e; }
.card-title { font-size: 14px; font-weight: 600; flex: 1; }
.arrow { color: #bbb; font-size: 11px; transition: transform 0.2s; flex-shrink: 0; }
.card.open .arrow { transform: rotate(180deg); }

.card-body { display: none; padding: 0 16px 14px; }
.card.open .card-body { display: block; }

.tmpl-text { background: #f8f9fa; border-radius: 8px; padding: 12px; font-size: 13px; line-height: 1.7; white-space: pre-wrap; word-break: break-all; max-height: 280px; overflow-y: auto; border: 1px solid #e5e7eb; color: #333; }

.card-actions { display: flex; gap: 8px; margin-top: 10px; }
.copy-btn { flex: 2; padding: 12px; background: #1a1a2e; color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
.copy-btn.done { background: #16a34a; }
.edit-btn { flex: 1; padding: 12px; background: #f0f2f5; color: #1a1a2e; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; }
.del-btn { flex: 1; padding: 12px; background: #fee2e2; color: #dc2626; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; }

.no-result { text-align: center; padding: 48px 16px; color: #bbb; font-size: 14px; }

/* 追加ボタン */
#addBtn { position: fixed; bottom: 24px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: #6366f1; color: white; border: none; font-size: 28px; cursor: pointer; box-shadow: 0 4px 16px rgba(99,102,241,0.4); z-index: 200; display: flex; align-items: center; justify-content: center; }

/* モーダル */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; display: none; align-items: flex-end; }
.modal-bg.open { display: flex; }
.modal { background: white; border-radius: 20px 20px 0 0; padding: 24px 20px; width: 100%; max-height: 90vh; overflow-y: auto; }
.modal h2 { font-size: 1.1rem; margin-bottom: 16px; }
.modal label { font-size: 12px; color: #888; font-weight: 600; display: block; margin-bottom: 4px; margin-top: 14px; }
.modal select, .modal input[type=text] { width: 100%; padding: 11px 14px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-size: 15px; background: #fafafa; }
.modal select:focus, .modal input:focus { outline: none; border-color: #6366f1; }
.modal textarea { width: 100%; padding: 11px 14px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-size: 14px; background: #fafafa; height: 200px; resize: vertical; font-family: inherit; line-height: 1.6; }
.modal textarea:focus { outline: none; border-color: #6366f1; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.modal-save { flex: 2; padding: 14px; background: #6366f1; color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }
.modal-cancel { flex: 1; padding: 14px; background: #f0f2f5; color: #555; border: none; border-radius: 12px; font-size: 15px; cursor: pointer; }
</style>
</head>
<body>

<div id="lockScreen">
  <h2>🔒 テンプレ帳</h2>
  <input id="lockInput" type="password" inputmode="numeric" placeholder="••••" maxlength="10">
  <button id="lockBtn" onclick="checkPassword()">開く</button>
  <div id="lockError"></div>
</div>

<header>
  <h1>📋 テンプレ帳</h1>
  <input id="searchInput" type="search" placeholder="キーワードで検索…" autocomplete="off" oninput="render()">
</header>

<div class="tabs" id="tabs"></div>

<div class="count" id="count"></div>
<div id="list"></div>

<button id="addBtn" onclick="openModal()">＋</button>

<!-- 追加・編集モーダル -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 id="modalTitle">テンプレを追加</h2>
    <label>カテゴリ</label>
    <select id="mCat"></select>
    <label>タイトル</label>
    <input type="text" id="mTitle" placeholder="例：クレーム対応">
    <label>本文</label>
    <textarea id="mText" placeholder="テンプレ本文を入力…"></textarea>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">キャンセル</button>
      <button class="modal-save" onclick="saveTemplate()">保存</button>
    </div>
  </div>
</div>

<script>
// ── パスワード ──────────────────────────────
const PW = '8181';
const PW_KEY = 'tmpl_unlocked';

function checkPassword() {
  if (document.getElementById('lockInput').value === PW) {
    localStorage.setItem(PW_KEY, '1');
    document.getElementById('lockScreen').style.display = 'none';
  } else {
    document.getElementById('lockError').textContent = 'パスワードが違います';
    document.getElementById('lockInput').value = '';
  }
}
document.getElementById('lockInput').addEventListener('keydown', e => { if (e.key === 'Enter') checkPassword(); });
if (localStorage.getItem(PW_KEY) === '1') document.getElementById('lockScreen').style.display = 'none';

// ── カテゴリ管理 ──────────────────────────
const CAT_KEY = 'tmpl_cats_v1';
const DEFAULT_CATS = ['商品説明', '購入者返信', 'テクサポ', 'メーカー', 'カスタム'];

function loadCats() {
  try {
    const d = JSON.parse(localStorage.getItem(CAT_KEY));
    if (Array.isArray(d) && d.length) return d;
  } catch(e) {}
  saveCats(DEFAULT_CATS);
  return [...DEFAULT_CATS];
}

function saveCats(cats) {
  localStorage.setItem(CAT_KEY, JSON.stringify(cats));
}

function addCategory() {
  const name = prompt('新しいカテゴリ名を入力してください');
  if (!name || !name.trim()) return;
  const cats = loadCats();
  if (cats.includes(name.trim())) { alert('そのカテゴリはすでにあります'); return; }
  cats.push(name.trim());
  saveCats(cats);
  renderTabs();
  render();
}

function deleteCategory(cat) {
  const templates = getTemplates();
  const inUse = templates.some(t => t.cat === cat);
  if (inUse) { alert(`「${cat}」カテゴリにテンプレがあるため削除できません`); return; }
  if (!confirm(`「${cat}」を削除しますか？`)) return;
  const cats = loadCats().filter(c => c !== cat);
  saveCats(cats);
  if (currentCat === cat) currentCat = 'all';
  renderTabs();
  render();
}

function renameCategory(oldName) {
  const newName = prompt(`「${oldName}」を変更後の名前を入力`, oldName);
  if (!newName || !newName.trim() || newName.trim() === oldName) return;
  const trimmed = newName.trim();
  const cats = loadCats();
  if (cats.includes(trimmed)) { alert('その名前はすでにあります'); return; }
  // カテゴリ名を更新
  const idx = cats.indexOf(oldName);
  cats[idx] = trimmed;
  saveCats(cats);
  // テンプレのカテゴリ名も更新
  const data = loadData();
  data.templates = data.templates.map(t => t.cat === oldName ? { ...t, cat: trimmed } : t);
  saveData(data);
  if (currentCat === oldName) currentCat = trimmed;
  renderTabs();
  render();
}

function renderTabs() {
  const cats = loadCats();
  const tabs = document.getElementById('tabs');
  tabs.innerHTML =
    `<button class="tab ${currentCat === 'all' ? 'active' : ''}" data-cat="all" onclick="setTab(this)">すべて</button>` +
    cats.map(c =>
      `<div class="tab-wrap">
        <button class="tab ${currentCat === c ? 'active' : ''}" data-cat="${c}" onclick="setTab(this)">${escHtml(c)}</button>
        <span style="font-size:11px;color:#bbb;cursor:pointer;margin-left:-2px" onclick="renameCategory('${escHtml(c)}')">✎</span>
        <span style="font-size:11px;color:#bbb;cursor:pointer;" onclick="deleteCategory('${escHtml(c)}')">✕</span>
      </div>`
    ).join('') +
    `<button class="tab-add" onclick="addCategory()">＋ カテゴリ</button>`;

  // モーダルのselectも更新
  const sel = document.getElementById('mCat');
  if (sel) {
    const current = sel.value;
    sel.innerHTML = cats.map(c => `<option value="${escHtml(c)}">${escHtml(c)}</option>`).join('');
    if (current && cats.includes(current)) sel.value = current;
  }
}

// ── データ管理（localStorage）──────────────
const STORE_KEY = 'tmpl_data_v1';

function loadData() {
  try {
    const d = JSON.parse(localStorage.getItem(STORE_KEY));
    if (d && d.seeded) return d;
  } catch(e) {}
  // 初回：組み込みテンプレをシード
  const data = {
    seeded: true,
    templates: BUILTIN.map((t, i) => ({ ...t, id: 'b' + i, builtin: true }))
  };
  saveData(data);
  return data;
}

function saveData(data) {
  localStorage.setItem(STORE_KEY, JSON.stringify(data));
}

function getTemplates() {
  return loadData().templates;
}

// ── UI ────────────────────────────────────
let currentCat = 'all';
let editingId = null;

function setTab(btn) {
  currentCat = btn.dataset.cat;
  renderTabs();
  render();
}

function render() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const all = getTemplates();
  const filtered = all.filter(t => {
    const catOk = currentCat === 'all' || t.cat === currentCat;
    const qOk = !q || t.title.toLowerCase().includes(q) || t.text.toLowerCase().includes(q);
    return catOk && qOk;
  });

  document.getElementById('count').textContent = `${filtered.length} 件`;

  const list = document.getElementById('list');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-result">該当するテンプレがありません</div>';
    return;
  }

  list.innerHTML = filtered.map(t => `
    <div class="card" id="card_${t.id}">
      <div class="card-header" onclick="toggle('${t.id}')">
        <span class="badge badge-${t.cat}">${t.cat}</span>
        <span class="card-title">${escHtml(t.title)}</span>
        <span class="arrow">▼</span>
      </div>
      <div class="card-body">
        <div class="tmpl-text">${escHtml(t.text)}</div>
        <div class="card-actions">
          <button class="copy-btn" id="copybtn_${t.id}" onclick="copyText('${t.id}')">コピー</button>
          <button class="edit-btn" onclick="openModal('${t.id}')">編集</button>
          <button class="del-btn" onclick="deleteTemplate('${t.id}')">削除</button>
        </div>
      </div>
    </div>
  `).join('');
}

function toggle(id) {
  document.getElementById('card_' + id).classList.toggle('open');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyText(id) {
  const t = getTemplates().find(t => t.id === id);
  if (!t) return;
  navigator.clipboard.writeText(t.text).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = t.text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  });
  const btn = document.getElementById('copybtn_' + id);
  btn.textContent = 'コピーしました ✓'; btn.classList.add('done');
  setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('done'); }, 2000);
}

function deleteTemplate(id) {
  if (!confirm('このテンプレを削除しますか？')) return;
  const data = loadData();
  data.templates = data.templates.filter(t => t.id !== id);
  saveData(data);
  render();
}

// ── モーダル ──────────────────────────────
function openModal(id = null) {
  editingId = id;
  const modal = document.getElementById('modalBg');
  if (id) {
    const t = getTemplates().find(t => t.id === id);
    document.getElementById('modalTitle').textContent = 'テンプレを編集';
    document.getElementById('mCat').value = t.cat;
    document.getElementById('mTitle').value = t.title;
    document.getElementById('mText').value = t.text;
  } else {
    document.getElementById('modalTitle').textContent = 'テンプレを追加';
    document.getElementById('mCat').value = '購入者返信';
    document.getElementById('mTitle').value = '';
    document.getElementById('mText').value = '';
  }
  modal.classList.add('open');
  setTimeout(() => document.getElementById('mTitle').focus(), 100);
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
  editingId = null;
}

function saveTemplate() {
  const cat = document.getElementById('mCat').value;
  const title = document.getElementById('mTitle').value.trim();
  const text = document.getElementById('mText').value.trim();
  if (!title) { alert('タイトルを入力してください'); return; }
  if (!text) { alert('本文を入力してください'); return; }

  const data = loadData();
  if (editingId) {
    const idx = data.templates.findIndex(t => t.id === editingId);
    if (idx >= 0) { data.templates[idx] = { ...data.templates[idx], cat, title, text }; }
  } else {
    data.templates.push({ id: 'u' + Date.now(), cat, title, text, builtin: false });
  }
  saveData(data);
  closeModal();
  render();
}

// モーダル外クリックで閉じる
document.getElementById('modalBg').addEventListener('click', e => {
  if (e.target === document.getElementById('modalBg')) closeModal();
});

renderTabs();
render();
</script>
